global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  - job_name: router_warm
    scrape_interval: 3s
    metrics_path: /metrics/warm
    static_configs:
      - targets: ["router:9090"]

  - job_name: router_stats
    scrape_interval: 3s
    metrics_path: /metrics/stats
    static_configs:
      - targets: ["router:9090"]

