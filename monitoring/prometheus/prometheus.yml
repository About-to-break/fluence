global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rabbitmq_rules.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  - job_name: rabbitmq_queue_metrics
    scrape_interval: 3s
    metrics_path: /metrics/detailed
    params:
      family:
        - queue_coarse_metrics
        - queue_consumer_count
      vhost:
        - /fluence_translation
    static_configs:
      - targets: ["rabbitmq:15692"]

  - job_name: router_warm
    scrape_interval: 3s
    metrics_path: /metrics/warm
    static_configs:
      - targets: ["router:9090"]

  - job_name: router_stats
    scrape_interval: 3s
    metrics_path: /metrics/stats
    static_configs:
      - targets: ["router:9090"]

  - job_name: nmt_warm
    scrape_interval: 3s
    metrics_path: /metrics/warm
    static_configs:
      - targets: ["nmt_translator:9090"]

  - job_name: nmt_stats
    scrape_interval: 3s
    metrics_path: /metrics/stats
    static_configs:
      - targets: ["nmt_translator:9090"]

  - job_name: llm_warm
    scrape_interval: 3s
    metrics_path: /metrics/warm
    static_configs:
      - targets: ["llm_translator:9090"]

  - job_name: llm_stats
    scrape_interval: 3s
    metrics_path: /metrics/stats
    static_configs:
      - targets: ["llm_translator:9090"]

  # Future service scrapes: enable only after metrics endpoints and ports are defined.
  # - job_name: api_gateway
  #   scrape_interval: 3s
  #   metrics_path: /metrics
  #   static_configs:
  #     - targets: ["api_gateway:<port>"]

