services:
  vllm:
    image: vllm/vllm-openai:latest
    container_name: vllm-fluence
    ports:
      - "8000:8000"
    volumes:
      - ${HF_CACHE_DIR:-~/.cache/huggingface}:/root/.cache/huggingface
    command: [
      "--host", "0.0.0.0",
      "--port", "8000",
      "--model", "${VLLM_MODEL}",
      "--quantization", "${VLLM_QUANTIZATION}",
      "--max-model-len", "${VLLM_MAX_MODEL_LEN}",
      "--gpu-memory-utilization", "${VLLM_GPU_MEMORY_UTILIZATION}",
      "--hf-token", "${HF_TOKEN}",
      "--kv-cache-dtype","${KV_CACHE_DTYPE}",
      "--swap-space","${VLLM_RAM_SWAP_SPACE}",
      "--max-num-batched-tokens","${VLLM_MAX_BATCHED_TOKENS}",
      "--trust-remote-code",
      "--enable-prefix-caching",
      "--log-level debug",
    ]
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: [ "CMD-SHELL", "curl -fsS http://127.0.0.1:8000/health || exit 1" ]
      interval: 60s
      timeout: 3s
      retries: 6

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: rabbitmq-fluence
    ports:
      - "5672:5672"     # AMQP
      - "15672:15672"   # Web UI
    env_file:
      - rabbit/rabbit.env
    environment:
      RABBITMQ_LOAD_DEFINITIONS: "true"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq:rw
      - ./rabbit/definitions.json:/opt/definitions.json:ro
      - ./rabbit/rabbitmq.config:/etc/rabbitmq/rabbitmq.config:ro
    restart: unless-stopped

    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "check_port_connectivity" ]
      interval: 5s
      timeout: 10s
      retries: 5
      start_period: 10s

  api_gateway:
    build:
      context: services/api_gateway
      dockerfile: Dockerfile.api_gateway
    container_name: api_gateway
    env_file:
      - services/api_gateway/.env
    ports:
      - "8080:8080"
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy

  nmt_translator:
    build:
      context: services/machine_translator
      dockerfile: Dockerfile.machine_translator
    container_name: nmt_translator
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]

    llm_translator:
      build:
        context: services/llm_translator
        dockerfile: Dockerfile.llm_translator
      container_name: llm_translator
      env_file:
        - .env
      restart: unless-stopped
      depends_on:
        rabbitmq:
          condition: service_healthy
        vllm:
          condition: service_healthy

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    restart: unless-stopped

networks:
  fluence-net:
    name: test-net
    driver: bridge

volumes:
  rabbitmq_data:
  prometheus_data:
